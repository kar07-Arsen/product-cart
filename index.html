<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product card</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <button id="paint-color-first-card" class="product-card-button">PaintFirstCard</button>
  <button id="paint-color-all-cards" class="product-card-button">PaintAllCard</button>
  <button id="open-google" class="product-card-button">OpenGoogle</button>
  <button id="output-console-log" class="product-card-button">Output</button>
  <button id="change-color-button" class="product-card-button">Button change color</button>
  <ul class="product-card-list"></ul>
  <div class="background-image"></div>
  <h1 class="product-title"></h1>
  <template id="product-template">
    <li class="card-container">
        <img class="product-image" width="290" height="245">
        <span class="product-category"></span>
        <h3 class="product-name"></h3>
        <p class="product-description"></p>
        <span class="product-compound-span">Состав</span>
      <ul class="product-compound"></ul>
      <div class="product-price-container">
        <span class="product-price-label">Цена</span>
        <span class="product-price"></span>
      </div>
      </li>
    </template>
    <script src="main.js"></script>
    <script src="homework-5.js"></script>
    <script src="homework-6.js"></script>
    <script type="module" src="homework-7.js"></script>
    <script type="module" src="homework-8.js"></script>
</body>
</html>
